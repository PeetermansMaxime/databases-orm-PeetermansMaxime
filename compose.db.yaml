services:
  postgres:
    image: postgres:18-alpine
    restart: always
    ports:   # nog een port want vooralleerje in docker zit moet je de database kunnen benaderen via browser.
      - 5432:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bird_api
    volumes:
      - db:/var/lib/postgresql

volumes:
  db: